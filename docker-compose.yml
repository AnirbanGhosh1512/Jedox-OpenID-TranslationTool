version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: tt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       translationdb
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d translationdb"]
      interval: 5s
      retries: 10
    networks:
      - tt_net

  idp:
    build:
      context: ./IDP
      dockerfile: Dockerfile
    container_name: tt_idp
    restart: unless-stopped
    ports:
      - "8090:8090"
    networks:
      - tt_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tt_api
    restart: unless-stopped
    ports:
      - "8091:8091"
    environment:
      ASPNETCORE_ENVIRONMENT:     Production
      ASPNETCORE_URLS:            http://0.0.0.0:8091
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=translationdb;Username=postgres;Password=postgres"
      Oidc__Authority:            "http://idp:8090"
    depends_on:
      postgres:
        condition: service_healthy
      idp:
        condition: service_started
    networks:
      - tt_net

  php-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tt_ui
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      OIDC_AUTHORITY:     "http://localhost:8090"
      OIDC_CLIENT_ID:     php-ui
      OIDC_CLIENT_SECRET: php-secret
      OIDC_REDIRECT_URI:  "http://localhost:8080/callback.php"
      API_BASE_URL:       "http://api:8091"
    depends_on:
      - api
      - idp
    networks:
      - tt_net

volumes:
  postgres_data:

networks:
  tt_net:
    driver: bridge